<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="960" viewBox="0 0 1700 960">
  <defs>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #111; }
