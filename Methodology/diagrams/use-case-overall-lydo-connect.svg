  </text>
  <ellipse cx="525" cy="690" rx="64" ry="26" class="support" />
  <text x="525" y="690" class="small">
    <tspan x="525" dy="-6">Email</tspan>
    <tspan x="525" dy="14">Verification</tspan>
  </text>

  <!-- Main use cases: right side -->
  <ellipse cx="885" cy="105" rx="82" ry="28" class="usecase" />
  <text x="885" y="105" class="small">
    <tspan x="885" dy="-6">Manage User</tspan>
    <tspan x="885" dy="14">Accounts and Roles</tspan>
  </text>
