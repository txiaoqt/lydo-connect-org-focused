<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1320" viewBox="0 0 1800 1320" role="img" aria-label="Figure 1. General Use Case Diagram of LYDO Connect">
  <style>
    .title { font: 700 26px Arial, sans-serif; fill: #111827; }
    .system-title { font: 700 24px Arial, sans-serif; fill: #111827; }
    .label { font: 16px Arial, sans-serif; fill: #111827; }
    .small { font: 14px Arial, sans-serif; fill: #111827; }
    .actor-name { font: 20px Arial, sans-serif; fill: #111827; }
    .system-box { fill: #ffffff; stroke: #111827; stroke-width: 2; }
    .main-usecase { fill: #7dd3fc; stroke: #111827; stroke-width: 2; }
    .helper-usecase { fill: #ffffff; stroke: #111827; stroke-width: 2; }
    .assoc { stroke: #111827; stroke-width: 2.2; fill: none; }
    .include { stroke: #111827; stroke-width: 1.8; fill: none; stroke-dasharray: 7 6; }
    .actor-line { stroke: #111827; stroke-width: 3; }
  </style>

  <defs>
    <marker id="arrow-black" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"/>
    </marker>
  </defs>

  <text x="60" y="52" class="title">Figure 1. General Use Case Diagram of LYDO Connect</text>

  <rect x="220" y="90" width="1360" height="1180" class="system-box"/>
  <text x="900" y="126" text-anchor="middle" class="system-title">LYDO Connect System</text>

  <!-- Actors -->
  <circle cx="100" cy="520" r="16" fill="#9bdcf9" stroke="#111827" stroke-width="2"/>
  <line x1="100" y1="536" x2="100" y2="610" class="actor-line"/>
  <line x1="50" y1="560" x2="150" y2="560" class="actor-line"/>
  <line x1="100" y1="610" x2="65" y2="665" class="actor-line"/>
  <line x1="100" y1="610" x2="135" y2="665" class="actor-line"/>
  <text x="100" y="705" text-anchor="middle" class="actor-name">Organization User</text>

  <circle cx="1700" cy="520" r="16" fill="#9bdcf9" stroke="#111827" stroke-width="2"/>
  <line x1="1700" y1="536" x2="1700" y2="610" class="actor-line"/>
  <line x1="1650" y1="560" x2="1750" y2="560" class="actor-line"/>
  <line x1="1700" y1="610" x2="1665" y2="665" class="actor-line"/>
  <line x1="1700" y1="610" x2="1735" y2="665" class="actor-line"/>
  <text x="1700" y="705" text-anchor="middle" class="actor-name">LYDO Admin</text>

  <!-- Organization User use cases -->
  <ellipse cx="430" cy="180" rx="125" ry="34" class="main-usecase"/>
  <text x="430" y="186" text-anchor="middle" class="label">Log in to Account</text>

  <ellipse cx="430" cy="285" rx="150" ry="36" class="main-usecase"/>
  <text x="430" y="279" text-anchor="middle" class="label">Manage Organization</text>
  <text x="430" y="299" text-anchor="middle" class="label">Profile</text>

  <ellipse cx="430" cy="395" rx="162" ry="36" class="main-usecase"/>
  <text x="430" y="389" text-anchor="middle" class="label">Submit Registration</text>
  <text x="430" y="409" text-anchor="middle" class="label">Requirements</text>

  <ellipse cx="430" cy="505" rx="160" ry="36" class="main-usecase"/>
  <text x="430" y="499" text-anchor="middle" class="label">Upload Compliance</text>
  <text x="430" y="519" text-anchor="middle" class="label">Documents</text>

  <ellipse cx="430" cy="615" rx="145" ry="36" class="main-usecase"/>
  <text x="430" y="621" text-anchor="middle" class="label">Submit Budget Request</text>

  <ellipse cx="430" cy="725" rx="155" ry="36" class="main-usecase"/>
