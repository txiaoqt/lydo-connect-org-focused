<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-label="General use case diagram of LYDO Connect">
  <defs>
    <style>
      .title { font: 700 24px Arial, sans-serif; fill: #111827; }
      .actor-label { font: 400 18px Arial, sans-serif; fill: #111827; }
      .case-label { font: 400 14px Arial, sans-serif; fill: #111827; }
      .rel-label { font: 400 12px Arial, sans-serif; fill: #2563eb; }
      .note { font: 400 12px Arial, sans-serif; fill: #475569; }
      .system { fill: #ffffff; stroke: #334155; stroke-width: 3; }
      .primary { fill: #8fd3f4; stroke: #2b6f8f; stroke-width: 2; }
      .helper { fill: #ffffff; stroke: #0f172a; stroke-width: 2; }
      .link { stroke: #1f2937; stroke-width: 2; fill: none; }
      .dashed { stroke: #3b82f6; stroke-width: 1.7; fill: none; stroke-dasharray: 7 6; }
      .actor { stroke: #0f172a; stroke-width: 2.5; fill: none; stroke-linecap: round; }
    </style>
  </defs>

  <rect x="48" y="48" width="1504" height="884" class="system"/>
  <text x="800" y="80" text-anchor="middle" class="title">LYDO Connect System</text>

  <!-- Actors -->
  <g transform="translate(118,240)">
    <circle cx="0" cy="0" r="16" class="actor"/>
    <line x1="0" y1="16" x2="0" y2="84" class="actor"/>
    <line x1="-30" y1="40" x2="30" y2="40" class="actor"/>
    <line x1="0" y1="84" x2="-24" y2="130" class="actor"/>
    <line x1="0" y1="84" x2="24" y2="130" class="actor"/>
    <text x="-52" y="170" class="actor-label">Organization User</text>
  </g>

  <g transform="translate(1482,240)">
    <circle cx="0" cy="0" r="16" class="actor"/>
    <line x1="0" y1="16" x2="0" y2="84" class="actor"/>
    <line x1="-30" y1="40" x2="30" y2="40" class="actor"/>
    <line x1="0" y1="84" x2="-24" y2="130" class="actor"/>
    <line x1="0" y1="84" x2="24" y2="130" class="actor"/>
    <text x="-36" y="170" class="actor-label">LYDO Admin</text>
  </g>

  <!-- Organization primary use cases -->
  <ellipse cx="290" cy="150" rx="120" ry="32" class="primary"/>
  <text x="290" y="155" text-anchor="middle" class="case-label">Login</text>

  <ellipse cx="290" cy="235" rx="128" ry="32" class="primary"/>
  <text x="290" y="240" text-anchor="middle" class="case-label">Policy Agreement</text>

  <ellipse cx="365" cy="325" rx="152" ry="34" class="primary"/>
  <text x="365" y="330" text-anchor="middle" class="case-label">Manage Organization Profile</text>

  <ellipse cx="365" cy="415" rx="140" ry="34" class="primary"/>
  <text x="365" y="420" text-anchor="middle" class="case-label">Submit Documents</text>

  <ellipse cx="365" cy="505" rx="150" ry="34" class="primary"/>
  <text x="365" y="510" text-anchor="middle" class="case-label">Manage Budget Requests</text>

  <ellipse cx="365" cy="595" rx="158" ry="34" class="primary"/>
  <text x="365" y="600" text-anchor="middle" class="case-label">Submit Liquidation Report</text>

  <ellipse cx="365" cy="685" rx="136" ry="34" class="primary"/>
  <text x="365" y="690" text-anchor="middle" class="case-label">View News Preview</text>

  <!-- Organization helper use cases -->
  <ellipse cx="700" cy="150" rx="132" ry="28" class="helper"/>
  <text x="700" y="155" text-anchor="middle" class="case-label">Authenticate User</text>

  <ellipse cx="700" cy="205" rx="110" ry="28" class="helper"/>
  <text x="700" y="210" text-anchor="middle" class="case-label">Login Error</text>

  <ellipse cx="700" cy="235" rx="126" ry="28" class="helper"/>
  <text x="700" y="240" text-anchor="middle" class="case-label">Load Active Policy</text>

  <ellipse cx="700" cy="325" rx="138" ry="28" class="helper"/>
  <text x="700" y="330" text-anchor="middle" class="case-label">Validate Profile Details</text>

  <ellipse cx="700" cy="415" rx="136" ry="28" class="helper"/>
  <text x="700" y="420" text-anchor="middle" class="case-label">Validate Uploaded File</text>

  <ellipse cx="700" cy="505" rx="136" ry="28" class="helper"/>
  <text x="700" y="510" text-anchor="middle" class="case-label">Validate Budget Details</text>

  <ellipse cx="700" cy="595" rx="132" ry="28" class="helper"/>
  <text x="700" y="600" text-anchor="middle" class="case-label">Check Budget Approval</text>

  <ellipse cx="700" cy="685" rx="120" ry="28" class="helper"/>
  <text x="700" y="690" text-anchor="middle" class="case-label">Open Source Post</text>

  <!-- Admin primary use cases -->
  <ellipse cx="1280" cy="150" rx="158" ry="32" class="primary"/>
  <text x="1280" y="155" text-anchor="middle" class="case-label">Review Organization Records</text>

  <ellipse cx="1280" cy="235" rx="150" ry="32" class="primary"/>
  <text x="1280" y="240" text-anchor="middle" class="case-label">Manage Required Docs</text>

  <ellipse cx="1280" cy="325" rx="162" ry="34" class="primary"/>
  <text x="1280" y="330" text-anchor="middle" class="case-label">Review Document Submissions</text>

  <ellipse cx="1280" cy="415" rx="150" ry="34" class="primary"/>
  <text x="1280" y="420" text-anchor="middle" class="case-label">Review Budget Requests</text>

  <ellipse cx="1280" cy="505" rx="168" ry="34" class="primary"/>
  <text x="1280" y="510" text-anchor="middle" class="case-label">Monitor Barangay Allocation</text>

  <ellipse cx="1280" cy="595" rx="160" ry="34" class="primary"/>
  <text x="1280" y="600" text-anchor="middle" class="case-label">Review Liquidation Reports</text>

  <ellipse cx="1280" cy="705" rx="170" ry="34" class="primary"/>
  <text x="1280" y="710" text-anchor="middle" class="case-label">Review Notifications and Logs</text>

  <!-- Admin helper use cases -->
  <ellipse cx="920" cy="150" rx="128" ry="28" class="helper"/>
  <text x="920" y="155" text-anchor="middle" class="case-label">Review Record Status</text>

  <ellipse cx="920" cy="235" rx="126" ry="28" class="helper"/>
  <text x="920" y="240" text-anchor="middle" class="case-label">Update Required Docs</text>

  <ellipse cx="920" cy="325" rx="132" ry="28" class="helper"/>
  <text x="920" y="330" text-anchor="middle" class="case-label">Review Submission Details</text>

  <ellipse cx="920" cy="415" rx="124" ry="28" class="helper"/>
  <text x="920" y="420" text-anchor="middle" class="case-label">Apply Budget Updates</text>

  <ellipse cx="920" cy="505" rx="126" ry="28" class="helper"/>
  <text x="920" y="510" text-anchor="middle" class="case-label">Load Budget Summary</text>

  <ellipse cx="920" cy="595" rx="130" ry="28" class="helper"/>
  <text x="920" y="600" text-anchor="middle" class="case-label">Review Liquidation Status</text>

  <ellipse cx="920" cy="705" rx="154" ry="28" class="helper"/>
  <text x="920" y="710" text-anchor="middle" class="case-label">Review Logs and Notifications</text>

  <!-- Actor to primary links -->
  <line x1="150" y1="250" x2="168" y2="150" class="link"/>
  <line x1="150" y1="260" x2="165" y2="235" class="link"/>
  <line x1="150" y1="272" x2="195" y2="325" class="link"/>
  <line x1="150" y1="284" x2="205" y2="415" class="link"/>
  <line x1="150" y1="296" x2="212" y2="505" class="link"/>
  <line x1="150" y1="308" x2="220" y2="595" class="link"/>
  <line x1="150" y1="320" x2="228" y2="685" class="link"/>

  <line x1="1430" y1="250" x2="1412" y2="150" class="link"/>
  <line x1="1430" y1="260" x2="1412" y2="235" class="link"/>
  <line x1="1430" y1="272" x2="1408" y2="325" class="link"/>
  <line x1="1430" y1="284" x2="1405" y2="415" class="link"/>
  <line x1="1430" y1="296" x2="1400" y2="505" class="link"/>
  <line x1="1430" y1="308" x2="1398" y2="595" class="link"/>
  <line x1="1430" y1="320" x2="1395" y2="705" class="link"/>

  <!-- Include / extend relations: organization -->
  <line x1="410" y1="150" x2="568" y2="150" class="dashed"/>
  <text x="470" y="138" class="rel-label">&lt;&lt;include&gt;&gt;</text>

  <line x1="410" y1="162" x2="566" y2="198" class="dashed"/>
  <text x="468" y="193" class="rel-label">&lt;&lt;extend&gt;&gt;</text>

  <line x1="418" y1="235" x2="574" y2="235" class="dashed"/>
  <text x="474" y="224" class="rel-label">&lt;&lt;include&gt;&gt;</text>

  <line x1="470" y1="325" x2="568" y2="325" class="dashed"/>
  <text x="498" y="314" class="rel-label">&lt;&lt;include&gt;&gt;</text>

  <line x1="505" y1="415" x2="568" y2="415" class="dashed"/>
  <text x="520" y="404" class="rel-label">&lt;&lt;include&gt;&gt;</text>

  <line x1="515" y1="505" x2="568" y2="505" class="dashed"/>
  <text x="522" y="494" class="rel-label">&lt;&lt;include&gt;&gt;</text>

  <line x1="523" y1="595" x2="570" y2="595" class="dashed"/>
  <text x="526" y="584" class="rel-label">&lt;&lt;include&gt;&gt;</text>

  <line x1="501" y1="685" x2="578" y2="685" class="dashed"/>
  <text x="525" y="674" class="rel-label">&lt;&lt;include&gt;&gt;</text>

  <!-- Include relations: admin -->
  <line x1="1142" y1="150" x2="1048" y2="150" class="dashed"/>
  <text x="1060" y="138" class="rel-label">&lt;&lt;include&gt;&gt;</text>

  <line x1="1132" y1="235" x2="1046" y2="235" class="dashed"/>
  <text x="1065" y="224" class="rel-label">&lt;&lt;include&gt;&gt;</text>

  <line x1="1120" y1="325" x2="1052" y2="325" class="dashed"/>
  <text x="1058" y="314" class="rel-label">&lt;&lt;include&gt;&gt;</text>

  <line x1="1130" y1="415" x2="1044" y2="415" class="dashed"/>
  <text x="1060" y="404" class="rel-label">&lt;&lt;include&gt;&gt;</text>

  <line x1="1110" y1="505" x2="1046" y2="505" class="dashed"/>
  <text x="1050" y="494" class="rel-label">&lt;&lt;include&gt;&gt;</text>

  <line x1="1120" y1="595" x2="1048" y2="595" class="dashed"/>
  <text x="1058" y="584" class="rel-label">&lt;&lt;include&gt;&gt;</text>

  <line x1="1110" y1="705" x2="1066" y2="705" class="dashed"/>
  <text x="1042" y="694" class="rel-label">&lt;&lt;include&gt;&gt;</text>

  <text x="118" y="885" class="note">The diagram keeps the scope to Organization User and LYDO Admin only, with no public visitor actor.</text>
</svg>
