  <path d="M 317 125 L 382 168" class="extend" />
  <text x="348" y="162" class="rel-blue">&lt;&lt;extend&gt;&gt;</text>

  <path d="M 317 290 L 375 255" class="include" />
  <text x="343" y="260" class="rel">&lt;&lt;include&gt;&gt;</text>
  <path d="M 317 290 L 380 320" class="extend" />
  <text x="348" y="316" class="rel-blue">&lt;&lt;extend&gt;&gt;</text>

  <path d="M 317 395 L 372 385" class="include" />
