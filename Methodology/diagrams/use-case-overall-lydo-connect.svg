  <ellipse cx="1210" cy="785" rx="190" ry="36" class="main-usecase"/>
  <text x="1210" y="779" text-anchor="middle" class="label">Review Notifications</text>
  <text x="1210" y="799" text-anchor="middle" class="label">and Activity Logs</text>

