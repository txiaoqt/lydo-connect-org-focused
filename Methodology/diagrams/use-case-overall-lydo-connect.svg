<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-label="Figure 1. General Use Case Diagram of LYDO Connect">
  <style>
    .title { font: 700 24px Arial, sans-serif; fill: #111827; }
    .system-title { font: 700 22px Arial, sans-serif; fill: #111827; }
    .label { font: 16px Arial, sans-serif; fill: #111827; }
    .small { font: 14px Arial, sans-serif; fill: #111827; }
    .actor-name { font: 20px Arial, sans-serif; fill: #111827; }
    .system-box { fill: #ffffff; stroke: #111827; stroke-width: 2; }
    .main-usecase { fill: #7dd3fc; stroke: #111827; stroke-width: 2; }
    .helper-usecase { fill: #ffffff; stroke: #111827; stroke-width: 2; }
    .assoc { stroke: #111827; stroke-width: 2.2; fill: none; }
    .include { stroke: #111827; stroke-width: 1.8; fill: none; stroke-dasharray: 7 6; }
    .extend { stroke: #2563eb; stroke-width: 1.8; fill: none; stroke-dasharray: 7 6; }
    .actor-line { stroke: #111827; stroke-width: 3; }
  </style>

  <defs>
    <marker id="arrow-black" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
  </defs>

  <text x="60" y="50" class="title">Figure 1. General Use Case Diagram of LYDO Connect</text>

  <rect x="210" y="95" width="1180" height="840" class="system-box"/>
  <text x="800" y="128" text-anchor="middle" class="system-title">LYDO Connect System</text>

  <!-- Left actor -->
  <circle cx="95" cy="350" r="16" fill="#9bdcf9" stroke="#111827" stroke-width="2"/>
  <line x1="95" y1="366" x2="95" y2="440" class="actor-line"/>
  <line x1="45" y1="390" x2="145" y2="390" class="actor-line"/>
  <line x1="95" y1="440" x2="60" y2="495" class="actor-line"/>
  <line x1="95" y1="440" x2="130" y2="495" class="actor-line"/>
  <text x="95" y="535" text-anchor="middle" class="actor-name">Organization User</text>

  <!-- Right actor -->
  <circle cx="1495" cy="350" r="16" fill="#9bdcf9" stroke="#111827" stroke-width="2"/>
  <line x1="1495" y1="366" x2="1495" y2="440" class="actor-line"/>
  <line x1="1445" y1="390" x2="1545" y2="390" class="actor-line"/>
  <line x1="1495" y1="440" x2="1460" y2="495" class="actor-line"/>
  <line x1="1495" y1="440" x2="1530" y2="495" class="actor-line"/>
  <text x="1495" y="535" text-anchor="middle" class="actor-name">LYDO Admin</text>

  <!-- Left main use cases -->
  <ellipse cx="390" cy="210" rx="95" ry="34" class="main-usecase"/>
  <text x="390" y="216" text-anchor="middle" class="label">Login</text>

  <ellipse cx="390" cy="320" rx="155" ry="36" class="main-usecase"/>
  <text x="390" y="314" text-anchor="middle" class="label">Manage Organization</text>
  <text x="390" y="334" text-anchor="middle" class="label">Profile</text>

  <ellipse cx="390" cy="440" rx="165" ry="36" class="main-usecase"/>
  <text x="390" y="434" text-anchor="middle" class="label">Submit Compliance</text>
  <text x="390" y="454" text-anchor="middle" class="label">Documents</text>

  <ellipse cx="390" cy="560" rx="155" ry="36" class="main-usecase"/>
  <text x="390" y="554" text-anchor="middle" class="label">Manage Budget</text>
  <text x="390" y="574" text-anchor="middle" class="label">Requests</text>

  <ellipse cx="390" cy="680" rx="160" ry="36" class="main-usecase"/>
  <text x="390" y="674" text-anchor="middle" class="label">Submit Liquidation</text>
  <text x="390" y="694" text-anchor="middle" class="label">Reports</text>

  <ellipse cx="390" cy="800" rx="150" ry="36" class="main-usecase"/>
  <text x="390" y="794" text-anchor="middle" class="label">Manage YPOP</text>
  <text x="390" y="814" text-anchor="middle" class="label">Entries</text>

  <!-- Center helper use cases -->
  <ellipse cx="760" cy="160" rx="115" ry="30" class="helper-usecase"/>
  <text x="760" y="166" text-anchor="middle" class="small">Authenticate User</text>

  <ellipse cx="760" cy="245" rx="120" ry="30" class="helper-usecase"/>
  <text x="760" y="251" text-anchor="middle" class="small">Load Active Policy</text>

  <ellipse cx="680" cy="360" rx="145" ry="34" class="helper-usecase"/>
  <text x="680" y="354" text-anchor="middle" class="small">Validate Profile</text>
  <text x="680" y="372" text-anchor="middle" class="small">and Form Data</text>

  <ellipse cx="680" cy="480" rx="132" ry="34" class="helper-usecase"/>
  <text x="680" y="474" text-anchor="middle" class="small">Validate Uploaded</text>
  <text x="680" y="492" text-anchor="middle" class="small">Files</text>

  <ellipse cx="840" cy="610" rx="165" ry="34" class="helper-usecase"/>
  <text x="840" y="604" text-anchor="middle" class="small">Update Statuses and</text>
  <text x="840" y="622" text-anchor="middle" class="small">Generate Notifications</text>

  <ellipse cx="680" cy="740" rx="145" ry="34" class="helper-usecase"/>
  <text x="680" y="734" text-anchor="middle" class="small">Preview Files and</text>
  <text x="680" y="752" text-anchor="middle" class="small">News Records</text>

  <!-- Right main use cases -->
  <ellipse cx="1210" cy="210" rx="175" ry="36" class="main-usecase"/>
  <text x="1210" y="204" text-anchor="middle" class="label">Review Registration</text>
  <text x="1210" y="224" text-anchor="middle" class="label">and Documents</text>

  <ellipse cx="1210" cy="330" rx="185" ry="36" class="main-usecase"/>
  <text x="1210" y="324" text-anchor="middle" class="label">Review Budget and</text>
  <text x="1210" y="344" text-anchor="middle" class="label">Liquidation Records</text>

  <ellipse cx="1210" cy="450" rx="210" ry="36" class="main-usecase"/>
  <text x="1210" y="444" text-anchor="middle" class="label">Monitor Budget Tracking and</text>
  <text x="1210" y="464" text-anchor="middle" class="label">Barangay Allocation</text>

  <ellipse cx="1210" cy="570" rx="200" ry="36" class="main-usecase"/>
  <text x="1210" y="564" text-anchor="middle" class="label">Manage YPOP Validation</text>
  <text x="1210" y="584" text-anchor="middle" class="label">and YORP Registry</text>

  <ellipse cx="1210" cy="690" rx="185" ry="36" class="main-usecase"/>
  <text x="1210" y="684" text-anchor="middle" class="label">Manage News Releases</text>
  <text x="1210" y="704" text-anchor="middle" class="label">and Templates</text>

  <ellipse cx="1210" cy="810" rx="190" ry="36" class="main-usecase"/>
  <text x="1210" y="804" text-anchor="middle" class="label">Review Notifications</text>
  <text x="1210" y="824" text-anchor="middle" class="label">and Activity Logs</text>

  <!-- Solid actor associations -->
  <path d="M145 390 C220 290, 280 235, 300 220" class="assoc"/>
  <path d="M145 390 C220 345, 275 330, 245 320" class="assoc"/>
  <path d="M145 390 C220 415, 275 430, 230 440" class="assoc"/>
  <path d="M145 390 C220 495, 275 545, 240 560" class="assoc"/>
  <path d="M145 390 C220 575, 275 665, 235 680" class="assoc"/>
  <path d="M145 390 C220 670, 275 785, 245 800" class="assoc"/>

  <path d="M1445 390 C1380 280, 1340 230, 1300 220" class="assoc"/>
  <path d="M1445 390 C1380 345, 1340 330, 1325 330" class="assoc"/>
  <path d="M1445 390 C1380 430, 1340 445, 1310 450" class="assoc"/>
  <path d="M1445 390 C1380 535, 1340 565, 1310 570" class="assoc"/>
  <path d="M1445 390 C1380 640, 1340 680, 1320 690" class="assoc"/>
  <path d="M1445 390 C1380 760, 1340 800, 1320 810" class="assoc"/>

  <!-- Left dependency arrows -->
  <path d="M485 210 H600 V160 H645" class="include" marker-end="url(#arrow-black)"/>
  <text x="565" y="154" class="small">&lt;&lt;include&gt;&gt;</text>

  <path d="M485 228 H620 V245 H640" class="extend" marker-end="url(#arrow-blue)"/>
  <text x="570" y="238" class="small" fill="#2563eb">&lt;&lt;extend&gt;&gt;</text>

  <path d="M545 320 H585 V348 H535" class="include" marker-end="url(#arrow-black)"/>
  <text x="565" y="312" class="small">&lt;&lt;include&gt;&gt;</text>

  <path d="M555 430 H600 V382 H545" class="include" marker-end="url(#arrow-black)"/>
  <text x="575" y="398" class="small">&lt;&lt;include&gt;&gt;</text>

  <path d="M558 448 H610 V480 H548" class="include" marker-end="url(#arrow-black)"/>
  <text x="585" y="472" class="small">&lt;&lt;include&gt;&gt;</text>

  <path d="M548 560 H610 V506 H548" class="include" marker-end="url(#arrow-black)"/>
  <text x="585" y="528" class="small">&lt;&lt;include&gt;&gt;</text>

  <path d="M548 578 H700 V610 H675" class="include" marker-end="url(#arrow-black)"/>
  <text x="620" y="602" class="small">&lt;&lt;include&gt;&gt;</text>

  <path d="M550 680 H720 V636 H675" class="include" marker-end="url(#arrow-black)"/>
  <text x="630" y="652" class="small">&lt;&lt;include&gt;&gt;</text>

  <path d="M550 698 H585 V740 H535" class="extend" marker-end="url(#arrow-blue)"/>
  <text x="560" y="724" class="small" fill="#2563eb">&lt;&lt;extend&gt;&gt;</text>

  <path d="M545 800 H625 V514 H548" class="include" marker-end="url(#arrow-black)"/>
  <text x="605" y="612" class="small">&lt;&lt;include&gt;&gt;</text>

  <path d="M545 818 H735 V644 H720" class="include" marker-end="url(#arrow-black)"/>
  <text x="665" y="702" class="small">&lt;&lt;include&gt;&gt;</text>

  <path d="M545 785 H600 V480 H548" class="include" marker-end="url(#arrow-black)"/>
  <text x="565" y="632" class="small">&lt;&lt;include&gt;&gt;</text>

  <!-- Right dependency arrows -->
  <path d="M1035 210 H940 V480 H812" class="include" marker-end="url(#arrow-black)"/>
  <text x="945" y="236" class="small">&lt;&lt;include&gt;&gt;</text>

  <path d="M1028 330 H955 V610 H1005" class="include" marker-end="url(#arrow-black)"/>
  <text x="960" y="356" class="small">&lt;&lt;include&gt;&gt;</text>

  <path d="M1028 348 H920 V740 H825" class="extend" marker-end="url(#arrow-blue)"/>
  <text x="925" y="458" class="small" fill="#2563eb">&lt;&lt;extend&gt;&gt;</text>

  <path d="M1000 450 H930 V610 H1005" class="include" marker-end="url(#arrow-black)"/>
  <text x="935" y="474" class="small">&lt;&lt;include&gt;&gt;</text>

  <path d="M1010 570 H950 V480 H812" class="include" marker-end="url(#arrow-black)"/>
  <text x="955" y="520" class="small">&lt;&lt;include&gt;&gt;</text>

  <path d="M1010 588 H930 V610 H1005" class="include" marker-end="url(#arrow-black)"/>
  <text x="935" y="604" class="small">&lt;&lt;include&gt;&gt;</text>

  <path d="M1025 690 H955 V740 H825" class="extend" marker-end="url(#arrow-blue)"/>
  <text x="960" y="716" class="small" fill="#2563eb">&lt;&lt;extend&gt;&gt;</text>

  <path d="M1025 810 H930 V610 H1005" class="include" marker-end="url(#arrow-black)"/>
  <text x="935" y="786" class="small">&lt;&lt;include&gt;&gt;</text>
</svg>
