  <text x="900" y="206" text-anchor="middle" class="small">Authenticate User</text>

  <ellipse cx="900" cy="470" rx="132" ry="32" class="helper-usecase"/>
  <text x="900" y="476" text-anchor="middle" class="small">Upload Required Documents</text>

  <ellipse cx="900" cy="760" rx="120" ry="32" class="helper-usecase"/>
