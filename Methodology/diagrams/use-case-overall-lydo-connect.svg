<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="820" viewBox="0 0 1180 820" role="img" aria-labelledby="title desc">
  <title id="title">General Use Case Diagram of LYDO Connect</title>
  <desc id="desc">Use case diagram showing Public User, Youth User, LYDO Staff, and LYDO Super Admin interactions with the LYDO Connect System.</desc>
  <defs>
    <style>
      .boundary { fill: #ffffff; stroke: #1f2937; stroke-width: 2; }
      .actor-line { stroke: #111827; stroke-width: 2; fill: none; stroke-linecap: round; }
      .assoc { stroke: #111827; stroke-width: 1.5; fill: none; }
      .include { stroke: #111827; stroke-width: 1.2; stroke-dasharray: 6 5; fill: none; marker-end: url(#arrow); }
      .extend { stroke: #2563eb; stroke-width: 1.2; stroke-dasharray: 6 5; fill: none; marker-end: url(#blueArrow); }
      .usecase { fill: #64c7ec; stroke: #0f172a; stroke-width: 1.5; }
      .support { fill: #ffffff; stroke: #0f172a; stroke-width: 1.2; }
      .system-title { font: 700 16px Arial, sans-serif; fill: #111827; }
      .label { font: 13px Arial, sans-serif; fill: #111827; text-anchor: middle; dominant-baseline: middle; }
      .small { font: 11px Arial, sans-serif; fill: #111827; text-anchor: middle; dominant-baseline: middle; }
      .rel { font: 11px Arial, sans-serif; fill: #111827; text-anchor: middle; }
      .rel-blue { font: 11px Arial, sans-serif; fill: #2563eb; text-anchor: middle; }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#111827" />
    </marker>
    <marker id="blueArrow" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#2563eb" />
    </marker>
  </defs>

  <rect x="145" y="20" width="890" height="780" class="boundary" />
  <text x="590" y="45" class="system-title" text-anchor="middle">LYDO Connect System</text>

  <!-- Actors -->
  <g transform="translate(65 560)">
    <circle cx="0" cy="-44" r="10" fill="#9bdaf5" stroke="#111827" stroke-width="1.5" />
    <path d="M 0 -34 L 0 10 M -30 -18 L 30 -18 M 0 10 L -25 45 M 0 10 L 25 45" class="actor-line" />
    <text x="0" y="70" class="label">Public User</text>
  </g>
  <g transform="translate(65 325)">
    <circle cx="0" cy="-44" r="10" fill="#9bdaf5" stroke="#111827" stroke-width="1.5" />
    <path d="M 0 -34 L 0 10 M -30 -18 L 30 -18 M 0 10 L -25 45 M 0 10 L 25 45" class="actor-line" />
    <text x="0" y="70" class="label">Youth User</text>
  </g>
  <g transform="translate(1115 390)">
    <circle cx="0" cy="-44" r="10" fill="#9bdaf5" stroke="#111827" stroke-width="1.5" />
    <path d="M 0 -34 L 0 10 M -30 -18 L 30 -18 M 0 10 L -25 45 M 0 10 L 25 45" class="actor-line" />
    <text x="0" y="70" class="label">LYDO Staff</text>
  </g>
  <g transform="translate(1115 145)">
    <circle cx="0" cy="-44" r="10" fill="#9bdaf5" stroke="#111827" stroke-width="1.5" />
    <path d="M 0 -34 L 0 10 M -30 -18 L 30 -18 M 0 10 L -25 45 M 0 10 L 25 45" class="actor-line" />
    <text x="0" y="70" class="label">
      <tspan x="0" dy="0">LYDO Super</tspan>
      <tspan x="0" dy="15">Admin</tspan>
    </text>
  </g>

  <!-- Main use cases: left side -->
  <ellipse cx="255" cy="125" rx="62" ry="24" class="usecase" />
  <text x="255" y="125" class="label">Login</text>
  <ellipse cx="255" cy="190" rx="62" ry="26" class="usecase" />
  <text x="255" y="190" class="label">Manage Account</text>
  <ellipse cx="255" cy="290" rx="62" ry="28" class="usecase" />
  <text x="255" y="290" class="small">
    <tspan x="255" dy="-6">Register for</tspan>
    <tspan x="255" dy="14">Programs/Events</tspan>
  </text>
  <ellipse cx="255" cy="395" rx="62" ry="26" class="usecase" />
  <text x="255" y="395" class="label">Track Participation</text>
  <ellipse cx="255" cy="505" rx="66" ry="30" class="usecase" />
  <text x="255" y="505" class="small">
    <tspan x="255" dy="-6">Submit Service</tspan>
    <tspan x="255" dy="14">Requests</tspan>
  </text>
  <ellipse cx="255" cy="650" rx="62" ry="24" class="usecase" />
  <text x="255" y="650" class="label">Register</text>
  <ellipse cx="255" cy="720" rx="66" ry="26" class="usecase" />
  <text x="255" y="720" class="label">Browse Public Portal</text>

  <!-- Supporting use cases: center -->
  <ellipse cx="440" cy="75" rx="65" ry="27" class="support" />
  <text x="440" y="75" class="small">
    <tspan x="440" dy="-6">Authenticate</tspan>
    <tspan x="440" dy="14">User</tspan>
  </text>
  <ellipse cx="520" cy="125" rx="78" ry="26" class="support" />
  <text x="520" y="125" class="small">
    <tspan x="520" dy="-6">Two-Factor</tspan>
    <tspan x="520" dy="14">Authentication</tspan>
  </text>
  <ellipse cx="440" cy="175" rx="62" ry="24" class="support" />
  <text x="440" y="175" class="label">Login Error</text>
  <ellipse cx="435" cy="250" rx="66" ry="26" class="support" />
  <text x="435" y="250" class="small">
    <tspan x="435" dy="-6">Submit</tspan>
    <tspan x="435" dy="14">Registration</tspan>
  </text>
  <ellipse cx="440" cy="325" rx="62" ry="24" class="support" />
  <text x="440" y="325" class="label">Registration Error</text>
  <ellipse cx="440" cy="385" rx="70" ry="26" class="support" />
  <text x="440" y="385" class="small">
    <tspan x="440" dy="-6">View Participation</tspan>
    <tspan x="440" dy="14">Status</tspan>
  </text>
  <ellipse cx="490" cy="430" rx="73" ry="26" class="support" />
