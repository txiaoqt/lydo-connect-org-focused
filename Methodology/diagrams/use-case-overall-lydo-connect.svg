<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-label="Use case diagram of LYDO Connect">
  <defs>
    <style>
      .title { font: 700 24px Arial, sans-serif; fill: #111827; }
      .actor-label { font: 400 18px Arial, sans-serif; fill: #111827; }
      .uc-label { font: 400 14px Arial, sans-serif; fill: #111827; }
      .system { fill: #ffffff; stroke: #334155; stroke-width: 3; }
      .usecase { fill: #ffffff; stroke: #0f172a; stroke-width: 2; }
      .link { stroke: #1f2937; stroke-width: 2; fill: none; }
      .dashed { stroke: #3b82f6; stroke-width: 1.8; fill: none; stroke-dasharray: 7 6; }
      .actor { stroke: #0f172a; stroke-width: 2.5; fill: none; stroke-linecap: round; }
      .note { font: 400 12px Arial, sans-serif; fill: #475569; }
    </style>
  </defs>

  <rect x="40" y="40" width="1320" height="820" class="system"/>
  <text x="700" y="72" text-anchor="middle" class="title">LYDO Connect System</text>

  <!-- Actors -->
  <g transform="translate(95,210)">
    <circle cx="0" cy="0" r="16" class="actor"/>
    <line x1="0" y1="16" x2="0" y2="80" class="actor"/>
    <line x1="-30" y1="38" x2="30" y2="38" class="actor"/>
    <line x1="0" y1="80" x2="-24" y2="126" class="actor"/>
    <line x1="0" y1="80" x2="24" y2="126" class="actor"/>
    <text x="-46" y="162" class="actor-label">Organization User</text>
  </g>

  <g transform="translate(1290,210)">
    <circle cx="0" cy="0" r="16" class="actor"/>
    <line x1="0" y1="16" x2="0" y2="80" class="actor"/>
    <line x1="-30" y1="38" x2="30" y2="38" class="actor"/>
    <line x1="0" y1="80" x2="-24" y2="126" class="actor"/>
    <line x1="0" y1="80" x2="24" y2="126" class="actor"/>
    <text x="-36" y="162" class="actor-label">LYDO Admin</text>
  </g>

  <!-- Organization user use cases -->
  <ellipse cx="270" cy="130" rx="110" ry="30" class="usecase"/>
  <text x="270" y="135" text-anchor="middle" class="uc-label">Login</text>

  <ellipse cx="270" cy="215" rx="110" ry="30" class="usecase"/>
  <text x="270" y="220" text-anchor="middle" class="uc-label">Manage Account</text>

  <ellipse cx="320" cy="315" rx="135" ry="32" class="usecase"/>
  <text x="320" y="320" text-anchor="middle" class="uc-label">Manage Organization Profile</text>

  <ellipse cx="320" cy="420" rx="125" ry="32" class="usecase"/>
  <text x="320" y="425" text-anchor="middle" class="uc-label">Submit Documents</text>

  <ellipse cx="320" cy="530" rx="140" ry="32" class="usecase"/>
  <text x="320" y="535" text-anchor="middle" class="uc-label">Manage Budget Requests</text>

  <ellipse cx="320" cy="645" rx="145" ry="32" class="usecase"/>
  <text x="320" y="650" text-anchor="middle" class="uc-label">Submit Liquidation Report</text>

  <ellipse cx="320" cy="765" rx="120" ry="32" class="usecase"/>
  <text x="320" y="770" text-anchor="middle" class="uc-label">View News Preview</text>

  <!-- Admin use cases -->
  <ellipse cx="1080" cy="145" rx="150" ry="32" class="usecase"/>
  <text x="1080" y="150" text-anchor="middle" class="uc-label">Review Organization Records</text>

  <ellipse cx="1080" cy="250" rx="140" ry="32" class="usecase"/>
  <text x="1080" y="255" text-anchor="middle" class="uc-label">Manage Required Docs</text>

  <ellipse cx="1080" cy="355" rx="150" ry="32" class="usecase"/>
  <text x="1080" y="360" text-anchor="middle" class="uc-label">Review Document Submissions</text>

  <ellipse cx="1080" cy="460" rx="145" ry="32" class="usecase"/>
  <text x="1080" y="465" text-anchor="middle" class="uc-label">Review Budget Requests</text>

  <ellipse cx="1080" cy="565" rx="160" ry="32" class="usecase"/>
  <text x="1080" y="570" text-anchor="middle" class="uc-label">Monitor Barangay Allocation</text>

  <ellipse cx="1080" cy="670" rx="150" ry="32" class="usecase"/>
  <text x="1080" y="675" text-anchor="middle" class="uc-label">Review Liquidation Reports</text>

  <ellipse cx="1080" cy="775" rx="160" ry="32" class="usecase"/>
  <text x="1080" y="780" text-anchor="middle" class="uc-label">Review Notifications and Logs</text>

  <!-- Links from organization user -->
  <line x1="150" y1="230" x2="160" y2="130" class="link"/>
  <line x1="150" y1="230" x2="160" y2="215" class="link"/>
  <line x1="170" y1="250" x2="180" y2="315" class="link"/>
  <line x1="175" y1="255" x2="195" y2="420" class="link"/>
  <line x1="185" y1="260" x2="205" y2="530" class="link"/>
  <line x1="190" y1="265" x2="215" y2="645" class="link"/>
  <line x1="195" y1="270" x2="220" y2="765" class="link"/>

  <!-- Links from admin -->
  <line x1="1210" y1="230" x2="1180" y2="145" class="link"/>
  <line x1="1210" y1="230" x2="1180" y2="250" class="link"/>
  <line x1="1210" y1="250" x2="1180" y2="355" class="link"/>
  <line x1="1210" y1="270" x2="1180" y2="460" class="link"/>
  <line x1="1210" y1="290" x2="1180" y2="565" class="link"/>
  <line x1="1210" y1="310" x2="1180" y2="670" class="link"/>
  <line x1="1210" y1="330" x2="1180" y2="775" class="link"/>

  <!-- Include / extend notes -->
  <text x="435" y="158" class="note">&lt;&lt;include&gt;&gt; Authenticate User</text>
  <text x="435" y="188" class="note">&lt;&lt;extend&gt;&gt; Login Error</text>
  <text x="470" y="290" class="note">&lt;&lt;include&gt;&gt; Validate Profile Details</text>
  <text x="470" y="398" class="note">&lt;&lt;include&gt;&gt; Validate Uploaded File</text>
  <text x="470" y="508" class="note">&lt;&lt;include&gt;&gt; Validate Budget Details</text>
  <text x="470" y="620" class="note">&lt;&lt;include&gt;&gt; Check Budget Approval</text>
  <text x="470" y="735" class="note">&lt;&lt;include&gt;&gt; Open Source Post</text>

  <text x="850" y="200" class="note">&lt;&lt;include&gt;&gt; Review Record Status</text>
  <text x="845" y="305" class="note">&lt;&lt;include&gt;&gt; Update Required Docs</text>
  <text x="840" y="410" class="note">&lt;&lt;include&gt;&gt; Review Submission Details</text>
  <text x="845" y="515" class="note">&lt;&lt;include&gt;&gt; Apply Budget Updates</text>
  <text x="835" y="620" class="note">&lt;&lt;include&gt;&gt; Load Budget Summary</text>
  <text x="835" y="725" class="note">&lt;&lt;include&gt;&gt; Review Liquidation Status</text>
  <text x="820" y="830" class="note">&lt;&lt;include&gt;&gt; Review Logs and Notifications</text>
</svg>
