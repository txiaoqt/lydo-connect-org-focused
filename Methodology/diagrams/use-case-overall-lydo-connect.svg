  <path d="M1650 560 C1560 945, 1480 955, 1548 960" class="assoc"/>
  <path d="M1650 560 C1560 1055, 1480 1065, 1535 1070" class="assoc"/>
  <path d="M1650 560 C1560 1170, 1480 1178, 1485 1180" class="assoc"/>

  <!-- Include relationships from organization user use cases -->
  <path d="M555 180 H780 H785" class="include" marker-end="url(#arrow-black)"/>
  <text x="655" y="170" class="small">&lt;&lt;include&gt;&gt;</text>

  <path d="M592 395 H730 V470 H768" class="include" marker-end="url(#arrow-black)"/>
  <text x="655" y="386" class="small">&lt;&lt;include&gt;&gt;</text>

