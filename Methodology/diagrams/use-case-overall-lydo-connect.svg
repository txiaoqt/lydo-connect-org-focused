  <ellipse cx="1360" cy="180" rx="145" ry="34" class="main-usecase"/>
  <text x="1360" y="186" text-anchor="middle" class="label">Log in to Admin Account</text>

  <ellipse cx="1360" cy="300" rx="170" ry="36" class="main-usecase"/>
  <text x="1360" y="294" text-anchor="middle" class="label">Review Organization</text>
  <text x="1360" y="314" text-anchor="middle" class="label">Registration</text>

  <ellipse cx="1360" cy="410" rx="165" ry="36" class="main-usecase"/>
  <text x="1360" y="404" text-anchor="middle" class="label">Review Compliance</text>
  <text x="1360" y="424" text-anchor="middle" class="label">Documents</text>

  <ellipse cx="1360" cy="520" rx="155" ry="36" class="main-usecase"/>
  <text x="1360" y="526" text-anchor="middle" class="label">Review Budget Requests</text>

  <ellipse cx="1360" cy="630" rx="165" ry="36" class="main-usecase"/>
  <text x="1360" y="624" text-anchor="middle" class="label">Review Liquidation</text>
  <text x="1360" y="644" text-anchor="middle" class="label">Reports</text>

  <ellipse cx="1360" cy="740" rx="205" ry="36" class="main-usecase"/>
  <text x="1360" y="734" text-anchor="middle" class="label">Monitor Budget Allocation</text>
  <text x="1360" y="754" text-anchor="middle" class="label">and Utilization</text>

  <ellipse cx="1360" cy="850" rx="188" ry="36" class="main-usecase"/>
  <text x="1360" y="844" text-anchor="middle" class="label">Validate YPOP and</text>
  <text x="1360" y="864" text-anchor="middle" class="label">YORR Records</text>

  <ellipse cx="1360" cy="960" rx="200" ry="36" class="main-usecase"/>
  <text x="1360" y="954" text-anchor="middle" class="label">Post News and</text>
  <text x="1360" y="974" text-anchor="middle" class="label">Transparency Updates</text>

  <ellipse cx="1360" cy="1070" rx="175" ry="36" class="main-usecase"/>
  <text x="1360" y="1064" text-anchor="middle" class="label">Send Remarks and</text>
  <text x="1360" y="1084" text-anchor="middle" class="label">Notifications</text>

  <ellipse cx="1360" cy="1180" rx="125" ry="34" class="main-usecase"/>
  <text x="1360" y="1186" text-anchor="middle" class="label">View Audit Logs</text>

