  <ellipse cx="885" cy="275" rx="70" ry="26" class="usecase" />
  <text x="885" y="275" class="small">
    <tspan x="885" dy="-6">Manage Public</tspan>
    <tspan x="885" dy="14">Portal Content</tspan>
  </text>
  <ellipse cx="885" cy="350" rx="70" ry="26" class="usecase" />
  <text x="885" y="350" class="small">
    <tspan x="885" dy="-6">Manage</tspan>
    <tspan x="885" dy="14">Programs/Events</tspan>
  </text>
  <ellipse cx="885" cy="430" rx="68" ry="25" class="usecase" />
  <text x="885" y="430" class="label">Monitor Participation</text>
  <ellipse cx="885" cy="500" rx="76" ry="26" class="usecase" />
  <text x="885" y="500" class="small">
    <tspan x="885" dy="-6">Manage Participation</tspan>
    <tspan x="885" dy="14">Records</tspan>
  </text>
  <ellipse cx="885" cy="585" rx="72" ry="26" class="usecase" />
  <text x="885" y="585" class="label">Generate Reports</text>
  <ellipse cx="885" cy="690" rx="78" ry="28" class="usecase" />
  <text x="885" y="690" class="small">
    <tspan x="885" dy="-6">Manage</tspan>
    <tspan x="885" dy="14">Service Requests</tspan>
  </text>

  <!-- Supporting use cases: admin side -->
  <ellipse cx="720" cy="70" rx="70" ry="26" class="support" />
  <text x="720" y="70" class="small">
    <tspan x="720" dy="-6">Create/Update</tspan>
    <tspan x="720" dy="14">User Account</tspan>
  </text>
  <ellipse cx="650" cy="120" rx="58" ry="24" class="support" />
  <text x="650" y="120" class="label">Assign Role</text>
  <ellipse cx="720" cy="565" rx="61" ry="24" class="support" />
  <text x="720" y="565" class="label">Select Report Type</text>
  <ellipse cx="665" cy="615" rx="62" ry="24" class="support" />
  <text x="665" y="615" class="label">Retrieve Data</text>
  <ellipse cx="720" cy="655" rx="62" ry="24" class="support" />
  <text x="720" y="655" class="label">Review Request</text>
  <ellipse cx="650" cy="705" rx="62" ry="24" class="support" />
  <text x="650" y="705" class="label">Respond to Request</text>
  <ellipse cx="720" cy="755" rx="62" ry="24" class="support" />
  <text x="720" y="755" class="label">Evaluate Request</text>

